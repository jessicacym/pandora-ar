<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pandora.Protocol - AR</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a1a; color: #00ffcc; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      font-family: 'Courier New', monospace;
    }
    #loading h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: 4px; }
    #loading p { font-size: 13px; color: #00aa88; margin: 4px 0; }
    .spinner {
      width: 50px; height: 50px; border: 3px solid #0a2a1a;
      border-top-color: #00ffcc; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hint {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,20,15,0.85); color: #00ffcc; padding: 14px 28px;
      border-radius: 25px; font-family: 'Courier New', monospace; font-size: 14px;
      z-index: 100; text-align: center; pointer-events: none;
      border: 1px solid #00aa88; transition: opacity 0.5s; opacity: 0;
    }
    #debug {
      position: fixed; top: 5px; right: 5px; color: #0f0; font: 10px monospace;
      background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; z-index: 200;
      max-width: 200px; pointer-events: none;
    }
  </style>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    // Force all materials to MeshBasicMaterial (unlit) - fixes iOS Safari white texture issue
    // Also retries conversion after a delay to handle async texture decoding on iOS
    AFRAME.registerComponent('force-unlit', {
      init: function () {
        const el = this.el;
        el.addEventListener('model-loaded', () => {
          // Convert immediately
          this.convertMaterials('immediate');
          // Also retry after delays for iOS async texture decoding
          setTimeout(() => this.convertMaterials('retry-500ms'), 500);
          setTimeout(() => this.convertMaterials('retry-2s'), 2000);
        });
      },
      convertMaterials: function (tag) {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;
        const THREE = AFRAME.THREE;
        let converted = 0, textured = 0;
        mesh.traverse((child) => {
          if (child.isMesh && child.material) {
            const oldMat = child.material;
            // Always create fresh MeshBasicMaterial
            const newMat = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide });

            // Try to get texture from either old material's map or baseColorTexture
            const tex = oldMat.map || (oldMat.baseColorTexture ? oldMat.baseColorTexture : null);
            if (tex) {
              newMat.map = tex;
              // Force sRGB color space for correct color rendering
              if (newMat.map.colorSpace !== undefined) {
                newMat.map.colorSpace = THREE.SRGBColorSpace;
              } else if (newMat.map.encoding !== undefined) {
                newMat.map.encoding = THREE.sRGBEncoding;
              }
              newMat.map.needsUpdate = true;
              textured++;
            } else {
              // Use diffuse color fallback
              newMat.color = oldMat.color ? oldMat.color.clone() : new THREE.Color(0.8, 0.8, 0.8);
            }
            child.material = newMat;
            child.material.needsUpdate = true;
            converted++;
          }
        });
        const dbg = document.getElementById('debug');
        if (dbg) dbg.textContent = tag + ': ' + textured + '/' + converted + ' textured';
        console.log('[force-unlit ' + tag + '] converted=' + converted + ' textured=' + textured);
      }
    });
  </script>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <h1>PANDORA</h1>
    <p>P R O T O C O L</p>
    <p style="margin-top:15px; color:#006644;">Initializing AR...</p>
  </div>

  <div id="hint">Point camera at QR marker</div>
  <div id="debug">loading...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity
        id="corridor-model"
        gltf-model="url(./classroom.gltf?v=12)"
        position="0 0.3 0"
        rotation="-20 30 0"
        scale="0.016 0.016 0.016"
        force-unlit
        animation="property: rotation; to: -20 390 0; loop: true; dur: 30000; easing: linear;"
      ></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const loading = document.getElementById('loading');
    const hint = document.getElementById('hint');
    const model = document.getElementById('corridor-model');

    scene.addEventListener('arReady', () => {
      loading.style.display = 'none';
      hint.style.opacity = '1';
    });

    model.addEventListener('model-loaded', (e) => {
      console.log('Model loaded');
    });

    model.addEventListener('model-error', (e) => {
      console.error('Model error:', e.detail);
      document.getElementById('debug').textContent = 'MODEL ERROR';
    });

    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => {
      hint.style.opacity = '0';
    });
    target.addEventListener('targetLost', () => {
      hint.style.opacity = '1';
    });
  </script>

</body>
</html>
