<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pandora.Protocol - AR</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a1a; color: #00ffcc; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      font-family: 'Courier New', monospace;
    }
    #loading h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: 4px; }
    #loading p { font-size: 13px; color: #00aa88; margin: 4px 0; }
    .spinner {
      width: 50px; height: 50px; border: 3px solid #0a2a1a;
      border-top-color: #00ffcc; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hint {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,20,15,0.85); color: #00ffcc; padding: 14px 28px;
      border-radius: 25px; font-family: 'Courier New', monospace; font-size: 14px;
      z-index: 100; text-align: center; pointer-events: none;
      border: 1px solid #00aa88; transition: opacity 0.5s; opacity: 0;
    }
    #container { width: 100vw; height: 100vh; position: relative; }
  </style>

  <!-- Use A-Frame + MindAR A-Frame (proven working on iOS) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <h1>PANDORA</h1>
    <p>P R O T O C O L</p>
    <p style="margin-top:15px; color:#006644;">Initializing AR...</p>
  </div>

  <div id="hint">Point camera at QR marker</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Lighting - dimmer to show textures properly -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 0.4;"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.6;" position="1 3 1"></a-entity>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Load GLB directly via gltf-model component (no asset preload) -->
      <a-entity
        id="corridor-model"
        gltf-model="url(./classroom.glb?v=10)"
        position="0 0.15 0"
        rotation="-20 30 0"
        scale="0.002 0.002 0.002"
        animation="property: rotation; to: -20 390 0; loop: true; dur: 30000; easing: linear;"
      ></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const loading = document.getElementById('loading');
    const hint = document.getElementById('hint');
    const model = document.getElementById('corridor-model');

    scene.addEventListener('arReady', () => {
      loading.style.display = 'none';
      hint.style.opacity = '1';
    });

    // Log model loading for debugging
    model.addEventListener('model-loaded', (e) => {
      console.log('Model loaded successfully');
      const mesh = model.getObject3D('mesh');
      if (mesh) {
        let meshCount = 0, texturedCount = 0;
        mesh.traverse((child) => {
          if (child.isMesh) {
            meshCount++;
            if (child.material && child.material.map) {
              texturedCount++;
              console.log('Textured mesh:', child.name || meshCount);
            } else {
              console.log('Untextured mesh:', child.name || meshCount,
                'color:', child.material?.color?.getHexString());
            }
          }
        });
        console.log('Total meshes:', meshCount, 'Textured:', texturedCount);
      }
    });

    model.addEventListener('model-error', (e) => {
      console.error('Model load error:', e.detail);
    });

    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => {
      hint.style.opacity = '0';
    });
    target.addEventListener('targetLost', () => {
      hint.style.opacity = '1';
    });
  </script>

</body>
</html>
