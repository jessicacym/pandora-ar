<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AR School Corridor v6</title>
  <style>
    body { margin: 0; overflow: hidden; }
    .mindar-ui-overlay, .a-enter-vr, .a-orientation-modal,
    [class*="debug"], [id*="debug"] { display: none !important; }
    #ver {
      position: fixed; bottom: 8px; right: 8px;
      color: #fff; background: rgba(0,0,0,0.5);
      font: bold 14px sans-serif; padding: 2px 8px;
      border-radius: 4px; z-index: 99999;
      pointer-events: none;
    }
  </style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script>
    AFRAME.registerComponent('unity-look', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          this.el.object3D.traverse(child => {
            if (child.isMesh && child.material) {
              const m = child.material;
              m.roughness = 0.6;
              m.metalness = 0.1;
              m.needsUpdate = true;
            }
          });
        });
      }
    });
  </script>
</head>
<body>
  <div id="ver">v6</div>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0005; filterBeta: 0.01; missTolerance: 50; warmupTolerance: 5; uiScanning: no; uiLoading: no"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: false; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-assets>
      <a-asset-item id="corridor" src="./classroom.gltf?v=32"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.0" position="0 20 10"></a-light>

      <a-entity
        id="corridor-model"
        position="0 0 -0.4"
        rotation="55 20 0"
        scale="0.02 0.02 0.02"
      >
        <a-entity
          id="corridor-mesh"
          gltf-model="#corridor"
          position="-65 -7 -30"
          unity-look
        ></a-entity>
      </a-entity>

      <!-- Red location pin -->
      <a-entity position="0 0.4 0.05">
        <a-sphere radius="0.04" color="#EA4335" position="0 0.04 0"></a-sphere>
        <a-cone
          radius-bottom="0.025" radius-top="0"
          height="0.05" color="#EA4335"
          position="0 0 0" rotation="180 0 0"
        ></a-cone>
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
