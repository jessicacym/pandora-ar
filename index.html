<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pandora.Protocol - AR</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a1a; color: #00ffcc; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      font-family: 'Courier New', monospace;
    }
    #loading h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: 4px; }
    #loading p { font-size: 13px; color: #00aa88; margin: 4px 0; }
    .spinner {
      width: 50px; height: 50px; border: 3px solid #0a2a1a;
      border-top-color: #00ffcc; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hint {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,20,15,0.85); color: #00ffcc; padding: 14px 28px;
      border-radius: 25px; font-family: 'Courier New', monospace; font-size: 14px;
      z-index: 100; text-align: center; pointer-events: none;
      border: 1px solid #00aa88; transition: opacity 0.5s; opacity: 0;
    }
    #debug {
      position: fixed; top: 5px; right: 5px; color: #0f0; font: 10px monospace;
      background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; z-index: 200;
      max-width: 220px; pointer-events: none;
    }
    .a-inspector-loader, .rs-base, .a-enter-vr, .a-orientation-modal { display: none !important; }
  </style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script>
    AFRAME.registerComponent('unity-look', {
      init: function () {
        const el = this.el;
        el.addEventListener('model-loaded', () => {
          this.processModel('init');
          setTimeout(() => this.processModel('retry'), 1500);
        });
      },
      processModel: function (tag) {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;
        const THREE = AFRAME.THREE;
        let converted = 0, textured = 0, normalMapped = 0;
        mesh.traverse((child) => {
          if (child.isMesh && child.material) {
            const mat = child.material;
            const matName = (mat.name || '').toLowerCase();
            mat.side = THREE.DoubleSide;
            if (matName.includes('glass')) {
              mat.transparent = true;
              mat.opacity = 0.3;
              mat.color.setHex(0xc8dde8);
            }
            if (mat.map) {
              mat.map.colorSpace = THREE.SRGBColorSpace;
              mat.map.needsUpdate = true;
              textured++;
            }
            if (mat.normalMap) {
              mat.normalMap.colorSpace = THREE.NoColorSpace;
              mat.normalScale.set(1.0, 1.0);
              mat.normalMap.needsUpdate = true;
              normalMapped++;
            }
            mat.roughness = 0.75;
            mat.metalness = 0.0;
            mat.needsUpdate = true;
            converted++;
          }
        });
        const dbg = document.getElementById('debug');
        if (dbg) dbg.textContent = tag + ': ' + textured + '/' + converted + ' tex, ' + normalMapped + ' nrm';
      }
    });
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h1>PANDORA</h1>
    <p>P R O T O C O L</p>
    <p style="margin-top:15px; color:#006644;">Initializing AR...</p>
  </div>
  <div id="hint">Point camera at QR marker</div>
  <div id="debug">loading...</div>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0005; filterBeta: 0.01; missTolerance: 50; warmupTolerance: 3;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-entity light="type: ambient; color: #ffffff; intensity: 0.6;"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.8;" position="3 15 5"></a-entity>
    <a-entity light="type: directional; color: #e8eef5; intensity: 0.4;" position="-5 10 -3"></a-entity>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity
        id="corridor-model"
        position="0 0 0"
        rotation="-90 0 0"
        scale="0.01 0.01 0.01"
      >
        <a-entity
          id="corridor-mesh"
          gltf-model="url(./classroom.gltf?v=28)"
          position="-65 -7 -30"
          unity-look
        >
          <a-entity position="68.1 25 31.1">
            <a-sphere radius="3.5" color="#E53935" material="shader: flat;"></a-sphere>
            <a-sphere radius="1.2" color="#ffffff" position="0 0 3.2" material="shader: flat;"></a-sphere>
            <a-cone radius-top="2.5" radius-bottom="0" height="6" color="#E53935" position="0 -5.5 0" material="shader: flat;"></a-cone>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>
  <script>
    const scene = document.querySelector('a-scene');
    const loading = document.getElementById('loading');
    const hint = document.getElementById('hint');
    const model = document.getElementById('corridor-model');
    scene.addEventListener('arReady', () => {
      loading.style.display = 'none';
      hint.style.opacity = '1';
    });
    model.addEventListener('model-error', (e) => {
      document.getElementById('debug').textContent = 'MODEL ERROR';
    });
    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => {
      hint.style.opacity = '0';
      document.getElementById('debug').textContent = 'tracking';
    });
    target.addEventListener('targetLost', () => {
      hint.style.opacity = '1';
      document.getElementById('debug').textContent = 'lost';
    });
  </script>
</body>
