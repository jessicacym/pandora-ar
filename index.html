<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pandora.Protocol - AR Experience</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a1a; color: #00ffcc; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      font-family: 'Courier New', monospace;
    }
    #loading h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: 4px; }
    #loading p { font-size: 13px; color: #00aa88; margin: 4px 0; }
    .spinner {
      width: 50px; height: 50px; border: 3px solid #0a2a1a;
      border-top-color: #00ffcc; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #scanning-hint {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,20,15,0.85); color: #00ffcc; padding: 14px 28px;
      border-radius: 25px; font-family: 'Courier New', monospace; font-size: 14px;
      z-index: 100; text-align: center; pointer-events: none;
      transition: opacity 0.5s; border: 1px solid #00aa88;
    }
    #found-hint {
      position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,20,15,0.85); color: #00ffcc; padding: 10px 24px;
      border-radius: 20px; font-family: 'Courier New', monospace; font-size: 12px;
      z-index: 100; text-align: center; pointer-events: none;
      opacity: 0; transition: opacity 0.5s; border: 1px solid #00ffcc;
    }
  </style>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <h1>PANDORA</h1>
    <p>P R O T O C O L</p>
    <p style="margin-top:15px; color:#006644;">Initializing AR system...</p>
    <p style="font-size:11px; color:#004433; margin-top:10px;">Allow camera access when prompted</p>
  </div>

  <div id="scanning-hint" style="opacity:0;">
    Point camera at the Pandora marker
  </div>

  <div id="found-hint">
    // SYSTEM CONNECTED //
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="classroom-model" src="./classroom.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 3D Classroom Model -->
      <a-gltf-model
        src="#classroom-model"
        position="0 0.3 0"
        rotation="-90 0 0"
        scale="0.03 0.03 0.03"
        animation="property: rotation; to: -90 360 0; loop: true; dur: 25000; easing: linear;"
      ></a-gltf-model>

      <!-- PANDORA.PROTOCOL title -->
      <a-text
        value="PANDORA.PROTOCOL"
        align="center"
        position="0 0.7 0"
        scale="0.4 0.4 0.4"
        color="#00ffcc"
        font="mozillavr"
      ></a-text>

      <!-- Subtitle -->
      <a-text
        value="// SYSTEM ACTIVE //"
        align="center"
        position="0 -0.1 0"
        scale="0.25 0.25 0.25"
        color="#006644"
        font="mozillavr"
      ></a-text>

      <!-- Glowing rings -->
      <a-ring color="#00ffcc" inner-radius="0.35" outer-radius="0.38" position="0 0.3 0" rotation="-90 0 0" opacity="0.5"
        animation="property: scale; from: 0.8 0.8 0.8; to: 1.3 1.3 1.3; loop: true; dur: 2000; dir: alternate; easing: easeInOutSine;"></a-ring>
      <a-ring color="#00ccff" inner-radius="0.45" outer-radius="0.47" position="0 0.3 0" rotation="-90 0 0" opacity="0.3"
        animation="property: scale; from: 1.0 1.0 1.0; to: 0.7 0.7 0.7; loop: true; dur: 2500; dir: alternate; easing: easeInOutSine;"></a-ring>

      <!-- Floating particles -->
      <a-sphere color="#00ffcc" radius="0.02" position="0.35 0.4 0.1" opacity="0.8"
        animation="property: position; to: -0.35 0.5 -0.1; loop: true; dur: 3000; dir: alternate;"></a-sphere>
      <a-sphere color="#00ccff" radius="0.015" position="-0.25 0.5 0.05" opacity="0.7"
        animation="property: position; to: 0.25 0.2 0.15; loop: true; dur: 2500; dir: alternate;"></a-sphere>
      <a-sphere color="#ff00cc" radius="0.018" position="0.15 0.25 -0.1" opacity="0.6"
        animation="property: position; to: -0.15 0.55 0.1; loop: true; dur: 3500; dir: alternate;"></a-sphere>
      <a-sphere color="#ffcc00" radius="0.012" position="-0.4 0.35 0.0" opacity="0.5"
        animation="property: position; to: 0.4 0.45 0.05; loop: true; dur: 4000; dir: alternate;"></a-sphere>

    </a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const loading = document.getElementById('loading');
    const hint = document.getElementById('scanning-hint');
    const foundHint = document.getElementById('found-hint');

    scene.addEventListener('arReady', () => {
      loading.style.display = 'none';
      hint.style.opacity = '1';
    });

    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => {
      hint.style.opacity = '0';
      foundHint.style.opacity = '1';
      setTimeout(() => { foundHint.style.opacity = '0'; }, 3000);
    });
    target.addEventListener('targetLost', () => {
      hint.style.opacity = '1';
    });
  </script>

</body>
</html>
